---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%B %d, %Y" }}</p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <footer class="post-footer">
    <hr>
    <p style="text-align: center; color: #718096; font-size: 0.9em;">
      <em>Thanks for reading! This post was written as part of a weekly blogging experiment.</em>
    </p>
  </footer>
</article>
